<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lamp Login</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: radial-gradient(circle at top, #0f172a, #020617);
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial;
  color: white;
}

/* Rope */
#cord {
  position: absolute;
  top: 0;
  width: 6px;
  height: 140px;
  background: linear-gradient(#ccc, #666);
  cursor: pointer;
}

/* Lamp */
.lamp {
  position: absolute;
  top: 140px;
}

.light {
  width: 250px;
  height: 250px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,255,200,1), transparent);
  opacity: 0;
  transition: 0.5s;
  filter: blur(20px);
}

.lamp.on .light {
  opacity: 1;
}

/* Login box */
.login-box {
  position: absolute;
  bottom: 120px;
  width: 300px;
  padding: 20px;
  background: rgba(30,41,59,0.9);
  border-radius: 10px;
  text-align: center;

  opacity: 0;
  transform: translateY(20px);
  transition: 0.5s;
}

.login-box.show {
  opacity: 1;
  transform: translateY(0);
}

.login-box input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 5px;
  border: none;
}

.login-box button {
  width: 100%;
  padding: 10px;
  background: #22c55e;
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 5px;
}

/* Demo box */
.demo-box {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);

  width: 300px;
  padding: 15px;
  background: rgba(30,41,59,0.9);
  border-radius: 10px;
  text-align: center;
  border: 1px solid #22c55e;

  color: #e2e8f0;
  font-size: 14px;

  box-shadow: 0 0 10px rgba(34,197,94,0.3);
  transition: 0.4s;
}
</style>
</head>

<body>

<!-- ROPE -->
<div id="cord"></div>

<!-- LAMP -->
<div class="lamp" id="lamp">
  <div class="light"></div>
</div>

<!-- LOGIN BOX -->
<div class="login-box" id="loginBox">
  <h3>Login</h3>
  <input id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- DEMO BOX -->
<div class="demo-box" id="demoBox">
  <h4>🔐 Demo Access</h4>
  <p><strong>Username:</strong> admin</p>
  <p><strong>Password:</strong> 1234</p>
  <small>Use these credentials to access the project</small>
</div>

<script>
// Auto skip login if already logged in
if (localStorage.getItem("isLoggedIn") === "true") {
  window.location.href = "./admin.html";
}

// ELEMENTS
const cord = document.getElementById("cord");
const lamp = document.getElementById("lamp");
const loginBox = document.getElementById("loginBox");
const demoBox = document.getElementById("demoBox");

let isOn = false;

// LAMP TOGGLE + LOGIN + DEMO BOX
cord.addEventListener("click", () => {
  isOn = !isOn;

  lamp.classList.toggle("on");
  loginBox.classList.toggle("show");

  // Hide demo when login shows
  if (isOn) {
    demoBox.style.opacity = "0";
    demoBox.style.visibility = "hidden";
  } else {
    demoBox.style.opacity = "1";
    demoBox.style.visibility = "visible";
  }
});

// DEFAULT USERS
if (!localStorage.getItem("users")) {
  localStorage.setItem(
    "users",
    JSON.stringify([{ username: "admin", password: "1234" }])
  );
}

// LOGIN FUNCTION
function login() {
  const u = username.value.trim();
  const p = password.value.trim();

  const users = JSON.parse(localStorage.getItem("users"));
  const user = users.find(x => x.username === u && x.password === p);

  if (user) {
    localStorage.setItem("isLoggedIn", "true");
    window.location.href = "./admin.html";
  } else {
    alert("Wrong username or password");
  }
}
</script>

</body>
</html>
